{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Chat App</title>
    <link rel="stylesheet" href="{% static 'css/chat_page.css' %}">
</head>
<body>

<div class="container">


    <div class="sidebar">
        <button onclick="createChat()">+ New Chat</button>

        <div class="chat-list">
            {% for chat in chats %}
                <div id="chat-item-{{ chat.id }}" onclick="loadChat({{ chat.id }})">
                    {{ chat.title }}
                </div>
            {% endfor %}
        </div>
    </div>

    
    <div class="chat-area">

        <div id="chat-box" class="chat-box">
            {% for msg in messages %}
                <div class="message {{ msg.sender }}">
                    {{ msg.sender }}: {{ msg.content }}
                </div>
            {% endfor %}
        </div>

        <div class="input-area">
            <input type="text" id="message-input" placeholder="Type message...">
            <button onclick="sendMessage()">Send</button>
        </div>

    </div>

</div>

<script>
    let currentChatId = {{ current_chat.id|default:"null" }};

function createChat() {
    fetch("/create_chat/", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded",
            "X-CSRFToken": "{{ csrf_token }}"
        }
    })
    .then(res => res.json())
    .then(data => {
        window.location.href = `/chat_page/${data.chat_id}/`;
    });
}

function loadChat(chatId) {
    window.location.href = `/chat_page/${chatId}/`;
}

function sendMessage() {
    let input = document.getElementById("message-input");
    let message = input.value.trim();
    if (!message) return;

    let chatBox = document.getElementById("chat-box");

    chatBox.innerHTML += `<div class="message user"> ${message}</div>`;
    input.value = "";
    chatBox.scrollTop = chatBox.scrollHeight;

    fetch(`/send_message/${currentChatId}/`, {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded",
            "X-CSRFToken": "{{ csrf_token }}"
        },
        body: `message=${encodeURIComponent(message)}`
    })
    .then(res => res.json())
    .then(data => {
        chatBox.innerHTML += `<div class="message bot"> ${data.reply}</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;

        if (data.is_first_message) {
            let item = document.getElementById("chat-item-" + currentChatId);
            if (item) item.innerText = data.chat_title;
        }
    });
}
</script>

</body>
</html>
