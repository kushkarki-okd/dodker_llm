{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Chat App</title>
    <link rel="stylesheet" href="{% static 'css/chat_page.css' %}">
</head>
<body>

<div class="container">

   
    <div class="sidebar">
        <button class="new-chat-btn" onclick="createChat()">+ New Chat</button>

        <div class="chat-history" id="chat-history">
          
        </div>
    </div>

    
    <div class="chat-area">

        <div class="chat-box" id="chat-box"></div>

        <div class="input-area">
            <input type="text" id="message-input" placeholder="Type message...">
            <button onclick="sendMessage()">Send</button>
        </div>

    </div>

</div>

<script>
let currentChatId = 1;
let chatCount = 1;


function createChat() {
    chatCount++;
    currentChatId = chatCount;

    let history = document.getElementById("chat-history");

    let chatItem = document.createElement("div");
    chatItem.className = "chat-item";
    chatItem.innerText = "Chat " + chatCount;

    chatItem.onclick = function() {
        currentChatId = chatCount;
        document.getElementById("chat-box").innerHTML = "";
    };

    history.appendChild(chatItem);

    document.getElementById("chat-box").innerHTML = "";
}


function sendMessage() {
    let input = document.getElementById("message-input");
    let message = input.value;

    if (!message.trim()) return;

    let chatBox = document.getElementById("chat-box");

   
    chatBox.innerHTML += `<div class="message user">You: ${message}</div>`;

    fetch(`/send_message/${currentChatId}/`, {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded",
            "X-CSRFToken": "{{ csrf_token }}"
        },
        body: `message=${encodeURIComponent(message)}`
    })
    .then(res => res.json())
    .then(data => {
        chatBox.innerHTML += `<div class="message bot">Bot: ${data.reply}</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;
    });

    input.value = "";
}
</script>

</body>
</html>
