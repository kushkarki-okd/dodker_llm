version: "3.9"

services:

  web:
    build: .
    container_name: llm
    command: sh -c "py manage.py makemigrations && py manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - db

  db:
    image: postgres:14
    container_name:  postgres_db
    ports: 
      - "5432:5432"
    restart: always
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data 

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    restart: always"
    volumes:
      - ollama_data:/root/.ollama


volumes:
  postgres_data:
  ollama_data:


    
